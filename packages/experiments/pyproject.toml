[project]
name = "experiments"
version = "0.1.0"
description = "Research CLI for symmetries simulations and paper figures"
requires-python = ">=3.11"
dependencies = [
    "symmetries",
    "click>=8.1",
    "rich>=13.0",
    "numpy>=1.26",
    "matplotlib>=3.9",
    "pydantic>=2.0",
    "boto3>=1.35",
    "boto3-stubs[s3]>=1.42.64",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/experiments"]

[project.scripts]
experiments = "experiments.cli:main"

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = [
    "-v",
    "--tb=short",
    "--cov=experiments",
    "--cov-report=term-missing",
    "--cov-fail-under=100",
]

[tool.coverage.run]
source = ["experiments"]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    '^\s*\.\.\.\s*$',
]
