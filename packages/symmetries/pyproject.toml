[project]
name = "symmetries"
version = "0.1.0"
description = "Dynamical symmetry breaking in galaxies --deformed Lie-algebra integrals of motion"
requires-python = ">=3.11"
dependencies = [
    "galpy>=1.10.0",
    "numpy>=1.26.0",
    "scipy>=1.12.0",
]

[build-system]
requires = ["setuptools>=75.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[project.scripts]
symmetries = "symmetries.cli:main"

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = [
    "-v",
    "--tb=short",
    "--cov=symmetries",
    "--cov-report=term-missing",
    "--cov-fail-under=100",
]
markers = [
    "slow: marks tests that perform real galpy integration (deselect with '-m \"not slow\"')",
]

[tool.coverage.run]
source = ["symmetries"]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    '^\s*\.\.\.\s*$',
]
