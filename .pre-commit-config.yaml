repos:
  - repo: local
    hooks:
      # --- No non-ASCII characters ---
      - id: check-ascii
        name: check-ascii
        entry: sh -c 'if LC_ALL=C grep -n "[^[:print:][:space:]]" "$@"; then echo "Non-ASCII characters found"; exit 1; fi' --
        language: system
        types_or: [python, javascript, jsx, ts, tsx, markdown, yaml, json, css]

      # --- Python formatters (auto-fix) ---
      - id: black
        name: black
        entry: uv run black
        language: system
        types: [python]
        files: ^packages/(symmetries|experiments)/

      - id: isort
        name: isort
        entry: uv run isort
        language: system
        types: [python]
        files: ^packages/(symmetries|experiments)/

      # --- Python linters ---
      - id: flake8
        name: flake8
        entry: uv run flake8
        language: system
        types: [python]
        files: ^packages/(symmetries|experiments)/

      - id: pylint
        name: pylint
        entry: uv run pylint
        language: system
        types: [python]
        files: ^packages/(symmetries|experiments)/(src|tests)/

      - id: pydocstyle
        name: pydocstyle
        entry: uv run pydocstyle
        language: system
        types: [python]
        files: ^packages/(symmetries|experiments)/src/

      # --- Python typecheck (whole-project, not per-file) ---
      - id: mypy
        name: mypy
        entry: >-
          uv run mypy
          packages/symmetries/src/
          packages/symmetries/tests/
          packages/experiments/src/
          packages/experiments/tests/
        language: system
        types: [python]
        pass_filenames: false
        files: ^packages/(symmetries|experiments)/

      # --- JS/TS formatters (auto-fix) ---
      - id: prettier
        name: prettier
        entry: yarn prettier --write
        language: system
        types_or: [javascript, jsx, ts, tsx, json, markdown, yaml, css]

      # --- JS/TS linters (auto-fix where possible) ---
      - id: eslint
        name: eslint
        entry: yarn eslint --max-warnings 0 --fix
        language: system
        types_or: [javascript, jsx, ts, tsx]

      # --- JS/TS typecheck (whole-project) ---
      - id: typecheck-ts
        name: tsc
        entry: yarn typecheck
        language: system
        pass_filenames: false
        types_or: [ts, tsx]

  # --- Commit message lint ---
  - repo: local
    hooks:
      - id: commitlint
        name: commitlint
        entry: yarn commitlint --edit
        language: system
        stages: [commit-msg]
        always_run: true
